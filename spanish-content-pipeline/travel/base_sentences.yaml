# Universal travel phrase base — language-agnostic
#
# `en` is the source concept (used to generate phrases in any language pair).
# `image_prompt` is used to generate the shared image once for all decks.
# Images are stored in output/travel-base/images/<id>.<ext> and reused.

sentences:

  # ── GREETINGS ────────────────────────────────────────────────────────────

  - id: "hello"
    category: "greetings"
    en: "Hello"
    image_prompt: "Two people smiling and waving hello to each other on a sunny city street, warm and friendly, cartoon illustration style"

  - id: "good_morning"
    category: "greetings"
    en: "Good morning"
    image_prompt: "Person greeting someone cheerfully at a bright sunny morning, coffee in hand, friendly smile, cartoon illustration style"

  - id: "good_evening"
    category: "greetings"
    en: "Good evening"
    image_prompt: "Two people greeting each other warmly at dusk, city lights beginning to glow in the background, cartoon illustration style"

  - id: "good_night"
    category: "greetings"
