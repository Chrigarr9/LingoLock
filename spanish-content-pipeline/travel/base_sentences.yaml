    image_prompt: "Person waving goodnight at a doorway, warm indoor light behind them, night sky visible, cartoon illustration style"

  - id: "goodbye"
    category: "greetings"
    en: "Goodbye"
    image_prompt: "Two people waving goodbye to each other outside, one walking away with a suitcase, friendly parting, cartoon illustration style"

  - id: "see_you_later"
    category: "greetings"
    en: "See you later"
    image_prompt: "Two friends parting on a street corner, one waving and smiling, casual and relaxed, cartoon illustration style"

  - id: "please"
    category: "greetings"
    en: "Please"
    image_prompt: "Person politely gesturing with open hand, friendly and respectful expression, cafe or shop setting, cartoon illustration style"

  - id: "thank_you"
    category: "greetings"
    en: "Thank you"
    image_prompt: "Person nodding thankfully with a warm smile, hand on chest, receiving something from another person, cartoon illustration style"

  - id: "thank_you_very_much"
    category: "greetings"
    en: "Thank you very much"
    image_prompt: "Person bowing slightly in gratitude, big warm smile, both hands pressed together in appreciation, cartoon illustration style"

