deck:
  name: "How I Met Your Mother S01"
  id: himym-s01-es
  type: subtitle

languages:
  target: Spanish
  target_code: es
  native: German
  native_code: de
  dialect: ""  # Latin American Spanish (lirondos subtitles)

show:
  title: "How I Met Your Mother"
  season: 1
  subtitle_url_base: "https://raw.githubusercontent.com/lirondos/subtitles/master/txt/HIMYM"
  art_style: "graphic novel panels, vibrant colors, bold outlines, semi-realistic cartoon"
  setting: "New York City, 2005, young adults, MacLaren's bar and shared apartment"
  characters:
    - name: Ted
      image_tag: "lean young man, medium-length wavy brown hair, warm brown eyes, button-up shirt or casual blazer, open friendly expression"
      visual_tag: "ted_mosby"
    - name: Marshall
      image_tag: "very tall lanky young man, sandy blond hair, layered casual plaid shirt, broad friendly smile"
      visual_tag: "marshall_eriksen"
    - name: Lily
      image_tag: "petite woman, dyed auburn-red hair in loose waves, colourful vintage-style dress, expressive wide eyes"
      visual_tag: "lily_aldrin"
    - name: Robin
      image_tag: "tall woman, long straight dark-brown hair, confident upright posture, neat blazer or smart-casual top"
      visual_tag: "robin_scherbatsky"
    - name: Barney
      image_tag: "trim build, neatly slicked dark hair, always wearing a sharp suit and tie, mischievous grin"
      visual_tag: "barney_stinson"

subtitle_processing:
  quality_score_min: 3
  backfill_episode_threshold: 10
  chapter_size: 50
  weight_a_start: 3.0
  weight_a_end: 0.5
  weight_b_start: 0.5
  weight_b_end: 3.0

models:
  translation:
    provider: openrouter
    model: google/gemini-3.1-flash-lite-preview
    temperature: 0.3
    max_retries: 3
  enrichment:
    provider: openrouter
    model: google/gemini-3.1-flash-lite-preview
    temperature: 0.3
    max_retries: 3

image_generation:
  enabled: true
  provider: fal
  model: fal-ai/z-image/turbo
  cheap_model: fal-ai/z-image/turbo
  style: "photorealistic, cinematic, warm natural light, clean simple background, no text"
  style_preset: photorealistic
  width: 512
  height: 384
  max_retries: 5

prior_decks: []

audio_generation:
  enabled: true
  provider: openai
  model: gpt-4o-mini-tts
  voice_name: onyx
  speaking_rate: 1.0

