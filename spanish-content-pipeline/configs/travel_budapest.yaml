deck:
  name: "Weekend in Budapest"
  id: "hu-de-budapest"
  type: "travel"

languages:
  target: "Hungarian"
  target_code: "hu"
  native: "German"
  native_code: "de"
  dialect: ""

protagonist:
  name: "Anna"
  gender: "female"
  origin_country: "Germany"
  visual_tag: "Anna: young woman, late 20s, straight blonde hair in a low ponytail, blue eyes, light denim jacket over a white top, grey jeans, small backpack"
  image_tag: "young woman late 20s, blonde ponytail, denim jacket, white top, grey jeans, small backpack"

destination:
  country: "Hungary"
  city: "Budapest"

story:
  cefr_level: "A1"
  sentences_per_chapter: [14, 20]
  narration_style: "third-person"
  audit_max_iterations: 0
  grammar_constraints: >
    CRITICAL CONSTRAINTS — follow ALL of these:
    1. Use ONLY simple present tense. No past tense, no future, no subjunctive, no conditional.
    2. Maximum 8 words per sentence. Extremely short and simple.
    3. No abstract vocabulary. Only concrete, everyday words a tourist uses.
    4. No reported speech. No complex grammar.
    5. VOCABULARY LEVEL: Use only the 100 most essential travel words. Think phrasebook,
       not literature. Every sentence should teach a word the tourist will actually need
       to say or understand during a weekend trip.
    6. Heavily favor DIALOGUE — at least half the sentences should be direct quoted
       speech that the tourist could use verbatim (ordering, asking, greeting, thanking).
    7. Skip scene-setting fluff. No "she sees the river" or "he agrees". Every sentence
       must contain a useful travel word or phrase.
  chapters:

    - title: "Arrival"
      context: >
        Anna and Tom at the airport and in a taxi. Focus on the phrases a tourist
        actually needs: saying hello, saying thank you, asking where the taxi is,
        telling the taxi driver their hotel address, asking how much, saying yes/no.
        Keep it to: greetings, taxi ride, basic numbers, please/thank you.
        DO NOT write about passport control, border guards, or luggage carousels.
      vocab_focus:
        - "greetings (szia, jó napot, jó estét, viszlát)"
        - "essentials (igen, nem, kérem, köszönöm, elnézést)"
        - "taxi (taxi, hol van a taxi, mennyibe kerül)"
        - "numbers (egy, kettő, három, négy, öt, tíz)"
        - "basic phrases (beszél angolul?, nem értem, lassan kérem)"

    - title: "Checking In"
      context: >
        Anna and Tom arrive at a small hotel. Focus on the phrases a tourist
        needs at a hotel: I have a reservation, room for two, where is the room,
        the key please, where is the bathroom, the WiFi password, thank you.
        Every sentence should be something you'd say at a hotel front desk.
      vocab_focus:
        - "hotel (szálloda, szoba, kulcs, foglalás)"
        - "requests (kérem, szeretnék, van, hol van)"
        - "room (ágy, fürdőszoba, törölköző, víz, meleg, hideg)"
        - "questions (hol, mi, hogyan, mikor)"
        - "polite (köszönöm, elnézést, bocsánat, kérem szépen)"

    - title: "Exploring the City"
      context: >
        Anna and Tom walk around Budapest. Focus on asking for directions,
        buying a tram ticket, asking where the castle is, asking how far
        something is, saying left/right/straight, buying an ice cream,
        asking the price. Dialogue with locals.
      vocab_focus:
        - "directions (merre, balra, jobbra, egyenesen, közel, messze)"
        - "transport (villamos, busz, megálló, jegy, mennyibe kerül)"
        - "places (vár, híd, templom, park, utca, tér)"
        - "shopping (mennyibe kerül, ezt kérem, köszönöm)"
        - "weather (meleg, hideg, szép idő van)"

    - title: "Dinner with Friends"
      context: >
        Anna and Tom at a restaurant. Focus entirely on ordering food and
        drinks: I would like a beer, a coffee please, the menu please, what
        do you recommend, the bill please, I pay with card, it is delicious,
        thank you. Every sentence should be something you'd say in a restaurant.
      vocab_focus:
        - "ordering (szeretnék, kérek, a menüt kérem, mit ajánl)"
        - "drinks (sör, kávé, víz, bor, tea, narancslé)"
        - "food (gulyás, leves, kenyér, hús, sajt, torta)"
        - "paying (számlát kérem, kártyával fizetek, mennyi, borravaló)"
        - "reactions (finom, nagyon jó, köszönöm, igen)"

    - title: "The Market and a Problem"
      context: >
        Anna and Tom at a market, then Tom feels sick. Focus on: how much is
        this, too expensive, I want this one, do you have a smaller one.
        Then: I feel sick, my stomach hurts, where is the pharmacy, I need
        medicine, water please, help. Practical emergency phrases.
      vocab_focus:
        - "shopping (mennyibe kerül, drága, olcsó, ezt kérem, van kisebb)"
        - "money (fizet, forint, kártya, készpénz, visszajáró)"
        - "health (rosszul vagyok, fáj, gyomor, fej, orvos, gyógyszertár)"
        - "emergency (segítség, kórház, hívjon mentőt)"
        - "basic (víz, kérem, köszönöm, igen, nem)"

    - title: "Goodbye, Budapest"
      context: >
        Last morning in Budapest. Focus on: checking out, ordering breakfast
        at a café (coffee, croissant, the bill), saying goodbye, saying
        thank you very much, it was beautiful, I want to come back. At the
        airport: where is gate X, boarding pass, goodbye.
      vocab_focus:
        - "café (kávé, croissant, sütemény, tej, cukor, számlát kérem)"
        - "farewell (viszlát, viszontlátásra, köszönöm szépen, jó utat)"
        - "feelings (szép volt, nagyon jó volt, köszönöm, boldog)"
        - "airport (reptér, kapu, beszállókártya, repülőgép)"
        - "checkout (kijelentkezés, fizetni, számla)"

models:
  story_generation:
    provider: "openrouter"
    model: "google/gemini-2.5-flash"
    temperature: 0.8

  translation:
    provider: "openrouter"
    model: "google/gemini-3.1-flash-lite-preview"
    temperature: 0.3

  word_extraction:
    provider: "openrouter"
    model: "google/gemini-3.1-flash-lite-preview"
    temperature: 0.3

  # Image pipeline reuses translation model
  image_review:
    provider: "openrouter"
    model: "google/gemini-3.1-flash-lite-preview"
    temperature: 0.3

  image_fix:
    provider: "openrouter"
    model: "google/gemini-3.1-flash-lite-preview"
    temperature: 0.3

image_generation:
  enabled: true
  provider: "fal"
  model: "fal-ai/z-image/turbo"
  cheap_model: "fal-ai/z-image/turbo"
  style: "cartoon, vibrant colors"
  width: 768
  height: 512

audio_generation:
  enabled: true
  provider: "gemini"
  model: "gemini-2.5-flash-preview-tts"
  voice_name: "Aoede"
  speaking_rate: 1.0

secondary_characters:
  - name: "Tom"
    visual_tag: "Tom: young man, late 20s, short brown hair, light stubble, green pullover, dark jeans, relaxed and friendly expression"
    image_tag: "young man late 20s, short brown hair, stubble, green pullover, dark jeans"
    chapters: [1, 2, 3, 4, 5, 6]
    role: "Anna's partner"
