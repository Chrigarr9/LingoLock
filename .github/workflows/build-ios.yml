name: Build iOS

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: Build profile
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: macos-latest
    env:
      BUILD_PROFILE: ${{ github.event.inputs.profile }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS app
        run: |
          eas build --local \
            --non-interactive \
            --platform ios \
            --profile "$BUILD_PROFILE" \
            --output "$GITHUB_WORKSPACE/app-build.ipa"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: app-build.ipa
